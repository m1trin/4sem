<!doctype html>
<html lang="ru" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <title>
        {% if title %}
          {{ title }}
        {% else %}
          Лабораторная работа №2
        {% endif %}
    </title>
  </head>
  <body class="d-flex flex-column h-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
              <a class="navbar-brand" href="{{ url_for('index') }}">Лабораторная работа № 2</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="{{ url_for('index') }}">Авторизация</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="{{ url_for('cookie') }}">Данные cookie</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('form') }}">Данные формы</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('headers') }}">Заголовки</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('mobile_number') }}">Проверка номера телефона</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('url') }}">Данные URL</a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
    </header>

    <!-- flex-shrink-0 не даёт main сжиматься -->
    <main class="flex-shrink-0 my-3">
        <div class="container">
            {% block content %}
                <h1>Содержимое по умолчанию</h1>
            {% endblock %}
        </div>
    </main>

    <!-- mt-auto прижимает footer к низу -->
    <footer class="footer mt-auto py-3 bg-dark text-light">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="mb-0">© 2026 Лабораторная работа №2</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-0">
                        Хилов Дмитрий Алексеевич<br>
                        241-327
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  </body>
</html>
