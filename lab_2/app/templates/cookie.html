{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Данные cookie</h1>
        
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="card-title mb-0">Cookie запроса</h5>
            </div>
            <div class="card-body">
                {% if cookie %}
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Имя cookie</th>
                                <th>Значение</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for key, value in request.cookies.items() %}
                            <tr>
                                <td>{{ key }}</td>
                                <td>{{ value }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                {% else %}
                    <div class="alert alert-info">
                        Нет cookie. Попробуйте <a href="{{ url_for('index') }}">авторизоваться</a>, чтобы установить cookie.
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
